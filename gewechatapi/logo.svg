<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- 背景 -->
  <rect width="500" height="350" fill="#07C160"/>
  
  <!-- 微信风格气泡 -->
  <circle cx="250" cy="140" r="80" fill="#FFFFFF"/>
  <circle cx="250" cy="140" r="70" fill="#07C160"/>
  
  <!-- 两个对话气泡 -->
  <ellipse cx="220" cy="130" rx="25" ry="20" fill="#FFFFFF"/>
  <ellipse cx="280" cy="130" rx="25" ry="20" fill="#FFFFFF"/>
  
  <!-- 小尾巴 -->
  <polygon points="200,160 220,150 210,170" fill="#FFFFFF"/>
  <polygon points="300,160 280,150 290,170" fill="#FFFFFF"/>
  
  <!-- 文字 -->
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">GewechatAPI</text>
  <text x="250" y="295" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">微信API Java SDK</text>
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="12" fill="#E0E0E0" text-anchor="middle">gewechatapi - 有任何帮助或疑问请联系我们</text>
</svg>