<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- 背景 -->
  <rect width="400" height="500" fill="#f5f5f5"/>
  
  <!-- 卡片背景 -->
  <rect x="20" y="20" width="360" height="460" rx="10" fill="#ffffff" stroke="#07C160" stroke-width="2"/>
  
  <!-- 顶部标题 -->
  <rect x="20" y="20" width="360" height="60" rx="10" fill="#07C160"/>
  <text x="200" y="58" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">联系我们</text>
  
  <!-- 二维码区域背景 -->
  <rect x="60" y="100" width="280" height="280" fill="#ffffff" stroke="#07C160" stroke-width="2"/>
  
  <!-- 二维码图案（简化版） -->
  <g fill="#07C160">
    <!-- 左上角定位图案 -->
    <rect x="80" y="120" width="60" height="60"/>
    <rect x="90" y="130" width="40" height="40" fill="#ffffff"/>
    <rect x="100" y="140" width="20" height="20"/>
    
    <!-- 右上角定位图案 -->
    <rect x="260" y="120" width="60" height="60"/>
    <rect x="270" y="130" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="140" width="20" height="20"/>
    
    <!-- 左下角定位图案 -->
    <rect x="80" y="300" width="60" height="60"/>
    <rect x="90" y="310" width="40" height="40" fill="#ffffff"/>
    <rect x="100" y="320" width="20" height="20"/>
    
    <!-- 中间微信图标 -->
    <circle cx="200" cy="240" r="50" fill="#07C160"/>
    <circle cx="185" cy="230" r="15" fill="#ffffff"/>
    <circle cx="215" cy="230" r="15" fill="#ffffff"/>
    <circle cx="185" cy="230" r="8" fill="#07C160"/>
    <circle cx="215" cy="230" r="8" fill="#07C160"/>
    <path d="M 170 250 Q 200 270 230 250" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <!-- 随机二维码点 -->
    <rect x="160" y="120" width="10" height="10"/>
    <rect x="180" y="140" width="10" height="10"/>
    <rect x="220" y="160" width="10" height="10"/>
    <rect x="150" y="180" width="10" height="10"/>
    <rect x="240" y="190" width="10" height="10"/>
    <rect x="160" y="210" width="10" height="10"/>
    <rect x="230" y="220" width="10" height="10"/>
    <rect x="150" y="260" width="10" height="10"/>
    <rect x="240" y="270" width="10" height="10"/>
    <rect x="160" y="290" width="10" height="10"/>
    <rect x="220" y="310" width="10" height="10"/>
    <rect x="180" y="330" width="10" height="10"/>
    <rect x="240" y="340" width="10" height="10"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="200" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">微信：gewechatapi</text>
  <text x="200" y="450" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">有任何帮助或疑问，请扫码联系我们</text>
</svg>